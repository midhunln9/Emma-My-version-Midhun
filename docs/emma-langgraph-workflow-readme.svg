<svg width="1400" height="760" viewBox="0 0 1400 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="64" y1="40" x2="1336" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F4EA"/>
      <stop offset="0.5" stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#EEF8F4"/>
    </linearGradient>
    <linearGradient id="voicePanel" x1="40" y1="110" x2="410" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8EE"/>
      <stop offset="1" stop-color="#FFFCF6"/>
    </linearGradient>
    <linearGradient id="graphPanel" x1="430" y1="110" x2="990" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF5FF"/>
      <stop offset="1" stop-color="#F9FCFF"/>
    </linearGradient>
    <linearGradient id="toolsPanel" x1="1010" y1="110" x2="1360" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F1FBF6"/>
      <stop offset="1" stop-color="#FBFEFC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#17324A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowNavy" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L10 5L0 10V0Z" fill="#284766"/>
