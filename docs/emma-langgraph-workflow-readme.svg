  <path d="M717 388V448" stroke="#284766" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowNavy)"/>
  <path d="M846 497H868" stroke="#284766" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowNavy)"/>

