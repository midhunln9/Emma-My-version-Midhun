  <path d="M816 314C902 290 986 274 1060 256" stroke="#456F9B" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 10" marker-end="url(#arrowBlue)"/>
  <path d="M816 334C906 350 986 378 1060 396" stroke="#456F9B" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 10" marker-end="url(#arrowBlue)"/>
  <path d="M816 356C904 420 986 484 1060 536" stroke="#456F9B" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 10" marker-end="url(#arrowBlue)"/>

  <path d="M342 536H430" stroke="#284766" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowNavy)"/>
  <path d="M342 676C470 748 994 748 1185 566" stroke="#284766" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowNavy)"/>
