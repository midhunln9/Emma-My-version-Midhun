    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L10 5L0 10V0Z" fill="#456F9B"/>
    </marker>
    <style>
      .title { font: 700 46px Arial, sans-serif; fill: #17324A; text-anchor: middle; }
      .section { font: 700 24px Arial, sans-serif; fill: #17324A; }
      .node { font: 700 24px Arial, sans-serif; fill: #17324A; text-anchor: middle; dominant-baseline: middle; }
      .tool { font: 700 17px Arial, sans-serif; fill: #17324A; text-anchor: middle; dominant-baseline: middle; }
      .chipLight { font: 700 18px Arial, sans-serif; fill: #FFFFFF; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect width="1400" height="760" rx="34" fill="url(#bg)"/>

  <text x="700" y="78" class="title">EMMA LangGraph Workflow</text>

  <rect x="40" y="110" width="370" height="610" rx="34" fill="url(#voicePanel)" stroke="#E8D5B3" stroke-width="2" filter="url(#shadow)"/>
  <rect x="430" y="110" width="560" height="610" rx="34" fill="url(#graphPanel)" stroke="#D0E0F1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1010" y="110" width="350" height="610" rx="34" fill="url(#toolsPanel)" stroke="#CEE7D8" stroke-width="2" filter="url(#shadow)"/>

  <text x="82" y="168" class="section">Voice Pipeline</text>
  <text x="472" y="168" class="section">LangGraph Core</text>
  <text x="1052" y="168" class="section">Agent Tools</text>

  <rect x="108" y="214" width="234" height="84" rx="26" fill="#F9E4D0" stroke="#DCA267" stroke-width="2"/>
