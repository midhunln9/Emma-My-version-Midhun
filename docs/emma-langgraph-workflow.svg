      .tool { font: 700 18px Arial, sans-serif; fill: #18334B; }
      .chipDark { font: 700 20px Arial, sans-serif; fill: #18334B; }
      .chipLight { font: 700 20px Arial, sans-serif; fill: #FFFFFF; }
